services:
  validate-pro:
    build:
      context: ../..
      dockerfile: Leetcode-QC/validate-pro/Dockerfile
    image: leetcode-validate-pro
    working_dir: /workspace
    volumes:
      - ../..:/workspace
    command: ["python", "Leetcode-QC/validate-pro/run_validation.py", "--repo-root", "/workspace"]

  generate-cases:
    build:
      context: ../..
      dockerfile: Leetcode-QC/validate-pro/Dockerfile
    image: leetcode-validate-pro
    working_dir: /workspace
    volumes:
      - ../..:/workspace
    command: ["python", "Leetcode-QC/validate-pro/generate_cases.py", "--repo-root", "/workspace"]
